# Server
server.port=8080

# H2 Database (File-based)
spring.datasource.url=jdbc:h2:file:./data/policyai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# Gemini AI Configuration
app.gemini.api-key=${GEMINI_API_KEY:}

# Logging
logging.level.com.policyai=DEBUG
logging.level.org.springframework.web=INFO

# JWT Configuration
jwt.secret=7a4f8b2e1d9c3f6a0e5b7d2c8f4a1e9b3d7c5f0a2e8b4d6c1f3a7e9b5d2c4f8a1e3b7d9c5f2a4e6b8c0d2f4a6e8b0c2d4f6a8b0c2d4e6f8a0b2c4d6e8f0a
jwt.expiration-ms=86400000

# Admin seed credentials (used only on first run if no users exist)
app.admin.email=venisha@policyai.com
app.admin.name=Venisha
app.admin.password=PolicyAI@2026

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
